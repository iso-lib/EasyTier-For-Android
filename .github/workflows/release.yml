name: Release APK

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Release version name (e.g., 1.0.1)'
        required: true
        type: string
      release_notes:
        description: 'Release notes'
        required: false
        type: string
        default: 'New release'

jobs:
  build-jni:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout EasyTier
        uses: actions/checkout@v4
        with:
          repository: EasyTier/EasyTier
          path: EasyTier

      - name: Download protoc
        run: |
          PROTOC_VERSION="29.1"
          curl -LO "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-linux-x86_64.zip"
          unzip -o "protoc-${PROTOC_VERSION}-linux-x86_64.zip" -d /usr/local
          echo "PROTOC=/usr/local/bin/protoc" >> $GITHUB_ENV

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Install Android targets
        run: |
          rustup target add armv7-linux-androideabi
          rustup target add i686-linux-android
          rustup target add x86_64-linux-android
          rustup target add aarch64-linux-android

      - name: Build easytier-ffi for all targets
        working-directory: EasyTier/easytier-contrib/easytier-ffi
        env:
          PROTOC: /usr/local/bin/protoc
        run: |
          cargo ndk -t arm64-v8a build --release
          cargo ndk -t armeabi-v7a build --release
          cargo ndk -t x86 build --release
          cargo ndk -t x86_64 build --release

      - name: Build easytier-android-jni for all targets
        working-directory: EasyTier/easytier-contrib/easytier-android-jni
        env:
          PROTOC: /usr/local/bin/protoc
        run: |
          cargo ndk -t arm64-v8a build --release
          cargo ndk -t armeabi-v7a build --release
          cargo ndk -t x86 build --release
          cargo ndk -t x86_64 build --release

      - name: Create output directory structure
        run: |
          mkdir -p jni-libs/arm64-v8a
          mkdir -p jni-libs/armeabi-v7a
          mkdir -p jni-libs/x86
          mkdir -p jni-libs/x86_64
          cp EasyTier/target/aarch64-linux-android/release/libeasytier_android_jni.so jni-libs/arm64-v8a/
          cp EasyTier/target/aarch64-linux-android/release/libeasytier_ffi.so jni-libs/arm64-v8a/
          cp EasyTier/target/armv7-linux-androideabi/release/libeasytier_android_jni.so jni-libs/armeabi-v7a/
          cp EasyTier/target/armv7-linux-androideabi/release/libeasytier_ffi.so jni-libs/armeabi-v7a/
          cp EasyTier/target/i686-linux-android/release/libeasytier_android_jni.so jni-libs/x86/
          cp EasyTier/target/i686-linux-android/release/libeasytier_ffi.so jni-libs/x86/
          cp EasyTier/target/x86_64-linux-android/release/libeasytier_android_jni.so jni-libs/x86_64/
          cp EasyTier/target/x86_64-linux-android/release/libeasytier_ffi.so jni-libs/x86_64/

      - name: Upload JNI libraries
        uses: actions/upload-artifact@v4
        with:
          name: jni-libs
          path: jni-libs/*/*.so

  build-and-release:
    runs-on: ubuntu-latest
    needs: build-jni
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download JNI libraries
        uses: actions/download-artifact@v4
        with:
          name: jni-libs
          path: app/src/main/jniLibs

      - name: Verify JNI libraries
        run: |
          echo "JNI library structure:"
          ls -la app/src/main/jniLibs/
          ls -la app/src/main/jniLibs/*/

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create gradle.properties
        run: |
           echo "android.useAndroidX=true" >> gradle.properties
           echo "android.nonTransitiveRClass=false" >> gradle.properties
           echo "org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g -XX:+HeapDumpOnOutOfMemoryError" >> gradle.properties
           echo "org.gradle.daemon=true" >> gradle.properties
           echo "org.gradle.parallel=true" >> gradle.properties
           echo "org.gradle.configureondemand=true" >> gradle.properties

      - name: Decode Keystore
        env:
          ENCODED_STRING: ${{ secrets.SIGNING_KEY_STORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.MY_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.MY_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.MY_KEY_PASSWORD }}
        run: |
          echo "$ENCODED_STRING" | base64 --decode > app/keystore.jks
          echo "" >> gradle.properties
          echo "MY_KEYSTORE_FILE=keystore.jks" >> gradle.properties
          echo "MY_KEYSTORE_PASSWORD=$KEYSTORE_PASSWORD" >> gradle.properties
          echo "MY_KEY_ALIAS=$KEY_ALIAS" >> gradle.properties
          echo "MY_KEY_PASSWORD=$KEY_PASSWORD" >> gradle.properties

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon
        env:
          JAVA_TOOL_OPTIONS: "-Xmx4g"

      - name: Verify APK contents
        run: |
          echo "APK files:"
          ls -la app/build/outputs/apk/release/
          echo ""
          echo "Checking APK for JNI libs:"
          unzip -l app/build/outputs/apk/release/app-armeabi-v7a-release.apk | grep -E "\.so$" || echo "No .so files found in armeabi-v7a APK"

      - name: Rename APKs
        id: apk-path
        run: |
          cd app/build/outputs/apk/release/
          for f in app-*-release.apk; do
            abi="${f#app-}"
            abi="${abi%-release.apk}"
            mv "$f" "easytier-${abi}.apk"
          done
          echo "apk_path=app/build/outputs/apk/release/*.apk" >> $GITHUB_OUTPUT

      - name: Create Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ inputs.version_name }}" -m "Release v${{ inputs.version_name }}"
          git push origin "v${{ inputs.version_name }}"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ inputs.version_name }}
          name: Release v${{ inputs.version_name }}
          body: ${{ inputs.release_notes }}
          files: app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

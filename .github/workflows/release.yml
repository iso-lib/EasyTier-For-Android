name: Release APK

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Release version name (e.g., 1.0.1)'
        required: true
        type: string
      release_notes:
        description: 'Release notes'
        required: false
        type: string
        default: 'New release'

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode Keystore
        env:
          ENCODED_STRING: ${{ secrets.SIGNING_KEY_STORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.MY_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.MY_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.MY_KEY_PASSWORD }}
        run: |
          echo "$ENCODED_STRING" | base64 --decode > app/keystore.jks
          echo "" >> gradle.properties
          echo "MY_KEYSTORE_FILE=keystore.jks" >> gradle.properties
          echo "MY_KEYSTORE_PASSWORD=$KEYSTORE_PASSWORD" >> gradle.properties
          echo "MY_KEY_ALIAS=$KEY_ALIAS" >> gradle.properties
          echo "MY_KEY_PASSWORD=$KEY_PASSWORD" >> gradle.properties

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon
        env:
          JAVA_TOOL_OPTIONS: "-Xmx4g"

      - name: Rename APK
        id: apk-path
        run: |
          ORIGINAL_APK=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)
          RENAMED_APK="app/build/outputs/apk/release/easytier-arm64-v8a.apk"
          mv "$ORIGINAL_APK" "$RENAMED_APK"
          echo "apk_path=$RENAMED_APK" >> $GITHUB_OUTPUT
          echo "APK_PATH=$RENAMED_APK"

      - name: Create Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ inputs.version_name }}" -m "Release v${{ inputs.version_name }}"
          git push origin "v${{ inputs.version_name }}"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ inputs.version_name }}
          name: Release v${{ inputs.version_name }}
          body: ${{ inputs.release_notes }}
          files: ${{ steps.apk-path.outputs.apk_path }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode Keystore
        env:
          ENCODED_STRING: ${{ secrets.SIGNING_KEY_STORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.MY_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.MY_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.MY_KEY_PASSWORD }}
        run: |
          echo "$ENCODED_STRING" | base64 --decode > app/keystore.jks
          echo "" >> gradle.properties
          echo "MY_KEYSTORE_FILE=keystore.jks" >> gradle.properties
          echo "MY_KEYSTORE_PASSWORD=$KEYSTORE_PASSWORD" >> gradle.properties
          echo "MY_KEY_ALIAS=$KEY_ALIAS" >> gradle.properties
          echo "MY_KEY_PASSWORD=$KEY_PASSWORD" >> gradle.properties

      - name: Build with Gradle
        run: ./gradlew assembleRelease --no-daemon
        env:
          JAVA_TOOL_OPTIONS: "-Xmx4g"

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/app-release.apk
